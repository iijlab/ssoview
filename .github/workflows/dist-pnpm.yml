name: "Distribution: [For manual use] Build and release"

permissions: {}

on:
  workflow_call:
    inputs:
      version:
        type: string
        default: ""
      is-release:
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        type: string
        default: ""
      is-release:
        description: "Create release page"
        type: boolean
        default: true

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on:
      - ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      REF_VERSION: ${{ github.ref_name }}
      INPUTS_VERSION: ${{ inputs.version }}
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "<24.16.0" # Workaround for the Node.js bug
          package-manager-cache: false
          cache: "pnpm"

        # - Node.js bug
        #   - Node 24.16.0: extract-zip hangs extracting
        #     https://github.com/nodejs/node/issues/63487
        #   - [Regression]: Browsers install stuck on Playwright < 1.60.0
        #     https://github.com/microsoft/playwright/issues/40998#issuecomment-4543917232

      - name: Install dependencies
        run: |
          set -ex
          pnpm install --frozen-lockfile

      - name: Install dependencies for Playwright
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
        run: |
          set -ex
          pnpm exec playwright install chromium chromium-headless-shell --with-deps

      - name: "Prebuild: lint"
        run: |
          set -ex
          pnpm run lint

      - name: "Prebuild: test"
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
        run: |
          set -ex
          pnpm run test

      - name: Build using pnpm
        run: |
          set -ex
          pnpm run build

      - name: Set the version
        id: set_version
        run: |
          set -ex
          VERSION_REG='^[0-9]+\.[0-9]+\.[0-9]+$' # major.minor.patch
          if [ -n "${INPUTS_VERSION}" ]; then
            V="${INPUTS_VERSION}"
          elif [[ (-n "${REF_VERSION}") && ("${REF_VERSION}" =~ ${VERSION_REG}) ]]; then
            V="${REF_VERSION}"
          else
            V=$(git describe --tags --always --dirty)
          fi
          echo "version=${V}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        if: ${{ inputs.is-release }}
        env:
          VERSION: ${{ steps.set_version.outputs.version }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ssoview-${{ env.VERSION }}
          path: ./dist/

  release:
    if: ${{ inputs.is-release }}
    needs:
      - build
    runs-on:
      - ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        id: download
        with:
          name: ssoview-${{ env.VERSION }}
          path: ./ssoview-${{ env.VERSION }}

      - name: Create zip archive
        run: |
          set -ex
          cd "./ssoview-${VERSION}/"
          zip -r "../ssoview-${VERSION}.zip" .

      - name: Create release page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -ex
          gh release create "${VERSION}" --title "SSOView ${VERSION}" --generate-notes
          gh release upload "${VERSION}" "./ssoview-${VERSION}.zip"
